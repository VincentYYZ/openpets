packages:
  - "apps/*"
  - "packages/*"
supportedArchitectures:
  os:
    - darwin
    - win32
    - linux
  cpu:
    - x64
    - arm64
  libc:
    - glibc
allowBuilds:
  '@google/genai': set this to true or false
  electron-winstaller: false
  koffi: set this to true or false
  protobufjs: set this to true or false
  sharp: true
